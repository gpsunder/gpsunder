<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>심도측정 V29</title>
<style>
body{font-family:Arial;margin:10px;background:#f4f6f8}
.card{background:#fff;padding:10px;border-radius:10px;margin-bottom:10px}
input,button{padding:12px;font-size:16px}
input{width:100%;box-sizing:border-box;margin:3px 0}
.row{display:flex;gap:5px}.row>*{flex:1}
table{width:100%;border-collapse:collapse;background:#fff}
th,td{border:1px solid #ccc;padding:4px;text-align:center}
.stat{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.box{background:#fff;padding:8px;border-radius:8px;text-align:center}
</style>
</head>
<body>
<h2>심도측정 V29 완성본</h2>

<div class="card">
<input id="worker" placeholder="작업자명">
<input id="addr" placeholder="주소">
<div class="row">
<input id="gps" readonly placeholder="GPS">
<button onclick="getLocation()">📍위치</button>
</div>
<input id="depth" type="number" step="0.01" placeholder="심도(m)">
<div class="row">
<button onclick="saveWithGPS()">💾저장</button>
<button onclick="refreshAddress()">🏠주소조회</button>
</div>
</div>

<div class="card">
<div class="row">
<button onclick="exportCSV()">📊엑셀</button>
<button onclick="backup()">💾백업</button>
<button onclick="restoreClick()">📂복원</button>
<button onclick="delSel()">🗑삭제</button>
</div>
<input type="file" id="restoreFile" hidden>
</div>

<div class="stat">
<div class="box">총건수<br><span id="cnt">0</span></div>
<div class="box">평균심도<br><span id="avg">0</span></div>
</div>

<table id="tbl">
<thead><tr><th>선택</th><th>No</th><th>일시</th><th>작업자</th><th>주소</th><th>심도</th><th>GPS</th></tr></thead>
<tbody></tbody>
</table>

<script>
const tb=document.querySelector("#tbl tbody");

worker.value=localStorage.worker||"";
addr.value=localStorage.addr||"";
tb.innerHTML=localStorage.data||"";

worker.oninput=()=>localStorage.worker=worker.value;
addr.oninput=()=>localStorage.addr=addr.value;

function saveLS(){localStorage.data=tb.innerHTML;}

function getLocation(){
 navigator.geolocation.getCurrentPosition(async p=>{
  let lat=p.coords.latitude, lon=p.coords.longitude;
  gps.value=lat.toFixed(6)+","+lon.toFixed(6);
  await reverse(lat,lon);
 },()=>alert("위치 권한 허용 필요"),{enableHighAccuracy:true});
}

async function reverse(lat,lon){
 try{
   let r=await fetch(`https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`);
   let d=await r.json();
   addr.value=d.display_name||"";
   localStorage.addr=addr.value;
 }catch(e){}
}

function refreshAddress(){
 let g=gps.value.split(",");
 if(g.length==2) reverse(g[0],g[1]);
}

function saveWithGPS(){
 if(!worker.value.trim()) return alert("작업자명 입력");
 if(!depth.value) return alert("심도 입력");

 const addRow=()=>{
 let tr=document.createElement("tr");
 tr.innerHTML=`<td><input type="checkbox"></td>
 <td>${tb.rows.length+1}</td>
 <td>${new Date().toLocaleString()}</td>
 <td>${worker.value}</td>
 <td>${addr.value}</td>
 <td>${depth.value}</td>
 <td>${gps.value}</td>`;
 tb.appendChild(tr);
 depth.value="";
 saveLS(); calc();
 if(navigator.vibrate) navigator.vibrate(150);
 };

 if(!gps.value){ getLocation(); setTimeout(addRow,1500); }
 else addRow();
}

function calc(){
 let a=[...tb.rows].map(r=>parseFloat(r.cells[5].innerText)).filter(v=>!isNaN(v));
 cnt.innerText=a.length;
 avg.innerText=a.length?(a.reduce((x,y)=>x+y,0)/a.length).toFixed(2):0;
}

function delSel(){
 [...tb.rows].forEach(r=>{if(r.querySelector("input").checked)r.remove();});
 [...tb.rows].forEach((r,i)=>r.cells[1].innerText=i+1);
 saveLS(); calc();
}

function exportCSV(){
 let csv="번호,일시,작업자,주소,심도,GPS\n";
 [...tb.rows].forEach(r=>csv+=`"${r.cells[1].innerText}","${r.cells[2].innerText}","${r.cells[3].innerText}","${r.cells[4].innerText}","${r.cells[5].innerText}","${r.cells[6].innerText}"\n`);
 let a=document.createElement("a");
 a.href=URL.createObjectURL(new Blob(["\ufeff"+csv]));
 a.download="심도측정_V29.csv";a.click();
}

function backup(){
 let a=document.createElement("a");
 a.href=URL.createObjectURL(new Blob([JSON.stringify({data:tb.innerHTML})]));
 a.download="심도측정_V29_백업.json";a.click();
}

function restoreClick(){restoreFile.click();}
restoreFile.onchange=e=>{
 let f=e.target.files[0]; if(!f)return;
 let r=new FileReader();
 r.onload=x=>{tb.innerHTML=(JSON.parse(x.target.result).data||""); saveLS(); calc();};
 r.readAsText(f);
};

calc();
getLocation();
</script>
</body>
</html>
